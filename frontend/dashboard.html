<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATLAS NFT – Tableau de bord</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header class="site-header">
        <div class="wrap nav">
            <a href="index.html" class="brand">🖤 ATLAS<span>NFT</span></a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Accueil</a>
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="bourse.html">Bourse</a>
                <a href="activate.html">Activer</a>
            </div>
            <div class="nav-right">
                <div class="coin-pill">
                    <span class="coin-dot"></span>
                    <span id="coinDisplay">0</span>
                    <span class="muted">coins</span>
                </div>
                <button onclick="logout()" class="btn btn-danger" style="padding:6px 14px;font-size:12px;">Déconnexion</button>
                <button class="nav-toggle" id="navToggle">☰</button>
            </div>
        </div>
    </header>

    <section class="wrap" style="padding:40px 0;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;">
            <div>
                <p class="eyebrow" style="color:var(--blue);font-weight:700;">👤 PORTEFEUILLE</p>
                <h1 style="font-size:clamp(28px,3.4vw,40px);font-weight:700;">Bienvenue, <span id="userName">Utilisateur</span></h1>
            </div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
                <span class="badge badge-blue">🪙 <span id="userCoins">0</span> coins</span>
                <span class="badge badge-gold">🎴 <span id="userNFTs">0</span> NFT</span>
            </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;">
            <div class="card" style="padding:20px;text-align:center;">
                <div style="font-family:'JetBrains Mono';font-size:28px;font-weight:700;color:var(--blue);" id="statNFT">0</div>
                <div style="color:var(--text-dim);font-size:12px;">NFT possédés</div>
            </div>
            <div class="card" style="padding:20px;text-align:center;">
                <div style="font-family:'JetBrains Mono';font-size:28px;font-weight:700;color:var(--gold);" id="statCoins">0</div>
                <div style="color:var(--text-dim);font-size:12px;">Coins ATLAS</div>
            </div>
            <div class="card" style="padding:20px;text-align:center;">
                <div style="font-family:'JetBrains Mono';font-size:28px;font-weight:700;color:var(--green);" id="statInvest">0</div>
                <div style="color:var(--text-dim);font-size:12px;">Investissements</div>
            </div>
            <div class="card" style="padding:20px;text-align:center;">
                <div style="font-family:'JetBrains Mono';font-size:28px;font-weight:700;color:var(--text);" id="statValue">0</div>
                <div style="color:var(--text-dim);font-size:12px;">Valeur totale (coins)</div>
            </div>
        </div>

        <div style="margin-top:40px;">
            <h2 style="font-size:22px;font-weight:700;margin-bottom:16px;">🎴 Mes NFT</h2>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;" id="nftList"></div>
        </div>

        <div style="margin-top:40px;">
            <h2 style="font-size:22px;font-weight:700;margin-bottom:16px;">📈 Évolution de la valeur</h2>
            <div class="card" style="padding:20px;height:280px;">
                <canvas id="valueChart"></canvas>
            </div>
        </div>
    </section>

    <footer class="site-footer">
        <div class="wrap footer-row">
            <span>© 2026 ATLAS NFT — plateforme communautaire</span>
            <span>Données en temps réel · 24h/24</span>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('navToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('open');
        });

        // Chargement des données utilisateur
        const user = JSON.parse(localStorage.getItem('atlas_user') || '{}');
        if (!user.user_id) {
            window.location.href = 'login.html';
        }

        document.getElementById('userName').textContent = user.email?.split('@')[0] || 'Utilisateur';
        document.getElementById('userCoins').textContent = user.coins || 0;
        document.getElementById('userNFTs').textContent = user.nfts?.length || 0;

        document.getElementById('statNFT').textContent = user.nfts?.length || 0;
        document.getElementById('statCoins').textContent = user.coins || 0;
        document.getElementById('statInvest').textContent = 3;
        document.getElementById('statValue').textContent = (user.coins || 0) + 1200;

        // NFT fictifs
        const nftData = user.nfts?.length ? user.nfts : [
            { edition: 'Or', tokenId: 'A7F3', value: 1240 },
            { edition: 'Bleue', tokenId: 'B2C9', value: 180 },
            { edition: 'Rouge', tokenId: 'D4E1', value: 610 }
        ];

        const nftList = document.getElementById('nftList');
        nftData.forEach(n => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.cssText = 'padding:16px;text-align:center;';
            const colors = { Or: 'var(--gold)', Bleue: 'var(--blue)', Rouge: 'var(--red)' };
            const emojis = { Or: '🟡', Bleue: '🔵', Rouge: '🔴' };
            div.innerHTML = `
                <div style="font-size:32px;">${emojis[n.edition] || '🎴'}</div>
                <div style="font-weight:700;margin-top:8px;">${n.edition}</div>
                <div style="color:var(--text-dim);font-size:12px;">#${n.tokenId}</div>
                <div style="font-family:'JetBrains Mono';font-weight:700;font-size:18px;margin-top:8px;color:${colors[n.edition] || 'var(--text)'};">${n.value} coins</div>
            `;
            nftList.appendChild(div);
        });

        new Chart(document.getElementById('valueChart'), {
            type: 'line',
            data: {
                labels: ['J-6', 'J-5', 'J-4', 'J-3', 'J-2', 'J-1', 'Aujourd\'hui'],
                datasets: [{
                    label: 'Valeur totale',
                    data: [980, 1020, 1150, 1200, 1300, 1420, 1500],
                    borderColor: '#00D4FF',
                    backgroundColor: 'rgba(0,212,255,0.08)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#7A8194', font: { size: 10 } } },
                    y: { grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#7A8194', font: { size: 10 } } }
                }
            }
        });
    </script>

</body>
</html>
